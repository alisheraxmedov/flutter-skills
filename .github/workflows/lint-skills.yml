name: lint-skills

on:
  push:
  pull_request:

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate skills (frontmatter, line cap, mojibake, JSON, references)
        run: python3 scripts/check_skills.py

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck hooks and scripts
        uses: ludeeus/action-shellcheck@master
